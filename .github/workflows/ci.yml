name: CI / Deploy Pipeline

# Bij een PR naar main: dependency-review + build-and-test (de "poort").
# Bij merge naar main:  build-and-test + deploy dev -> test -> prod.
# Het .omod artifact wordt één keer gebouwd en doorgestuurd naar elke deploy-job.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # === Controleert of nieuwe dependencies geen bekende kwetsbaarheden bevatten ===
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # === Bouwt de module, draait alle tests en bewaart de rapporten ===
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    env:
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      OMRS_ADMIN_PASSWORD: ${{ secrets.OMRS_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build module + unit tests
        run: mvn clean package --no-transfer-progress

      - name: Upload unit test rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            omod/target/surefire-reports/
            omod-common/target/surefire-reports/
          retention-days: 7

      - name: Upload omod artifact
        uses: actions/upload-artifact@v4
        with:
          name: webservices-rest-omod
          path: omod/target/*.omod
          retention-days: 7

      - name: Inject omod into modules dir
        run: |
          mkdir -p docker/modules
          rm -f docker/modules/*.omod
          cp omod/target/*.omod docker/modules/

      - name: Start OpenMRS stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml \
            up -d --wait --wait-timeout 360

      - name: Run integration tests
        run: |
          mvn verify -pl integration-tests -Pintegration-tests --no-transfer-progress \
            -DtestUrl=http://admin:${{ secrets.OMRS_ADMIN_PASSWORD }}@localhost:8081/openmrs

      - name: Upload integratie test rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: integration-tests/target/failsafe-reports/
          retention-days: 7

      - name: Show OpenMRS logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml logs openmrs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

  deploy-dev:
    name: Deploy to Dev
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Download omod artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: artifact/

      - name: Show artifact
        run: ls -la artifact/

      - name: Deploy to dev
        run: echo "Klaar voor deploy naar dev (server nog in te richten)"

  deploy-test:
    name: Deploy to Test
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Download omod artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: artifact/

      - name: Deploy to test
        run: echo "Klaar voor deploy naar test (server nog in te richten)"

  deploy-prod:
    name: Deploy to Prod
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Download omod artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: artifact/

      - name: Deploy to prod
        run: echo "Klaar voor productie-deploy (server nog in te richten)"
