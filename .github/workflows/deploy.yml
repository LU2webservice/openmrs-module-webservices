name: Deploy to OTAP

on:
  push:
    branches:
      - main

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build module
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Upload omod artifact
        uses: actions/upload-artifact@v4
        with:
          name: webservices-rest-omod
          path: omod/target/*.omod
          retention-days: 7

      - name: Deploy to dev
        run: echo "Klaar voor deploy naar dev (server nog in te richten)"

  deploy-test:
    name: Deploy to Test
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: test
    env:
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      OMRS_ADMIN_PASSWORD: ${{ secrets.OMRS_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Download omod artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: artifact/

      - name: Inject omod into modules dir
        run: |
          mkdir -p docker/modules
          rm -f docker/modules/*.omod
          cp artifact/*.omod docker/modules/

      - name: Start OpenMRS stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml \
            up -d --wait --wait-timeout 360

      - name: Run integration tests
        run: |
          mvn verify -pl integration-tests -Pintegration-tests --no-transfer-progress \
            -DtestUrl=http://admin:${{ secrets.OMRS_ADMIN_PASSWORD }}@localhost:8081/openmrs

      - name: Upload integratie test rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports-test-env
          path: integration-tests/target/failsafe-reports/
          retention-days: 7

      - name: Show OpenMRS logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml logs openmrs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

      - name: Stabilisatiepauze
        run: sleep 300

  deploy-prod:
    name: Deploy to Prod
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Download omod artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: artifact/

      - name: Deploy to prod
        run: echo "Klaar voor productie-deploy (server nog in te richten)"
