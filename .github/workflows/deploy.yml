name: Deploy to OTAP

# Triggert alleen na een merge naar main.
# CI heeft de code al getest via de PR-poort.
on:
  push:
    branches:
      - main

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build module
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Upload omod artifact
        uses: actions/upload-artifact@v4
        with:
          name: webservices-rest-omod
          path: omod/target/*.omod
          retention-days: 7

      - name: Deploy to dev
        run: echo "Klaar voor deploy naar dev (server nog in te richten)"

  deploy-test:
    name: Deploy to Test
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Download omod artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: artifact/

      - name: Deploy to test
        run: echo "Klaar voor deploy naar test (server nog in te richten)"

  deploy-prod:
    name: Deploy to Prod
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Download omod artifact
        uses: actions/download-artifact@v4
        with:
          name: webservices-rest-omod
          path: artifact/

      - name: Deploy to prod
        run: echo "Klaar voor productie-deploy (server nog in te richten)"
