name: SCA (Software Composition Analysis)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  grype-scan:
    name: Grype dependency scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build module (zonder tests)
        run: mvn clean package -DskipTests --no-transfer-progress -q

      - name: Scan met Grype
        id: scan
        uses: anchore/scan-action@v6
        with:
          path: "."
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype SARIF naar Security-tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype-sca

      - name: Upload Grype rapport als artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-sca-report
          path: ${{ steps.scan.outputs.sarif }}
          retention-days: 30
